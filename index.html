<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef SOSIN — Atelier</title>
<style>
  :root{
    --bg:#111213; --panel:#1b1c1e; --panel2:#232527; --border:#2f3134;
    --text:#ececec; --muted:#9a9a9a; --accent:#d4a24c; --accent2:#e8c37a;
    --danger:#e05252; --danger-bg:#3a2020; --ok:#4caf7d;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; padding-bottom:60px;}
  .container{max-width:1080px; margin:0 auto; padding:0 14px;}
  header{padding:18px 0 12px; border-bottom:1px solid var(--border); margin-bottom:14px;}
  header h1{font-size:19px; font-weight:600; letter-spacing:.3px;}
  header h1 span{color:var(--accent);}
  header p{font-size:11px; color:var(--muted); margin-top:2px;}
  .stats{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
  .stat{background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:6px 12px; font-size:12px; color:var(--muted);}
  .stat b{color:var(--text); margin-left:4px;}
  .tabs{display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:16px;
    -webkit-overflow-scrolling:touch;}
  .tab{padding:7px 13px; border-radius:8px; font-size:12.5px; cursor:pointer; white-space:nowrap;
    border:1px solid var(--border); background:var(--panel); color:var(--text); flex-shrink:0;}
  .tab.active{border-color:var(--accent); background:#2a2418; color:var(--accent2); font-weight:600;}
  .subtabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;}
  .subtab{padding:5px 12px; border-radius:8px; font-size:12px; cursor:pointer;
    border:1px solid var(--border); background:transparent; color:var(--text);}
  .subtab.active{border-color:var(--accent); background:#2a2418; color:var(--accent2); font-weight:600;}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; margin-bottom:10px;}
  .card h3{font-size:13px; font-weight:600; margin-bottom:10px;}
  .grid{display:grid; gap:8px; margin-bottom:8px;}
  .g2{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(3,1fr);}
  .g4{grid-template-columns:repeat(4,1fr);} .g5{grid-template-columns:repeat(5,1fr);}
  @media(max-width:640px){.g3,.g4,.g5{grid-template-columns:repeat(2,1fr);}}
  label.fld{display:block; font-size:10.5px; color:var(--muted); margin-bottom:3px; font-weight:600;
    text-transform:uppercase; letter-spacing:.4px;}
  input,select{width:100%; padding:8px 10px; font-size:13px; border-radius:8px;
    border:1px solid var(--border); background:var(--panel2); color:var(--text); outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  input[type=date]{color-scheme:dark;}
  button{cursor:pointer; font-family:inherit;}
  .btn{padding:8px 15px; font-size:13px; border-radius:8px; border:1px solid var(--border);
    background:var(--panel2); color:var(--text);}
  .btn-p{background:var(--accent); border-color:var(--accent); color:#1a1408; font-weight:600;}
  .btn-d{background:transparent; border-color:var(--danger); color:var(--danger);}
  .btn-sm{padding:4px 10px; font-size:11.5px;}
  .btn-full{width:100%; padding:10px;}
  .row-item{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; flex-wrap:wrap;}
  .row-item .info p:first-child{font-weight:600; font-size:14px;}
  .row-item .info p{font-size:12px; color:var(--muted); margin-top:2px;}
  .row-item .info p:first-child{color:var(--text);}
  .chips{display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;}
  .chip{font-size:11px; background:var(--panel2); padding:2px 8px; border-radius:6px;
    border:1px solid var(--border); color:var(--muted);}
  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  th{padding:7px 9px; text-align:left; font-weight:600; font-size:11px; color:var(--muted);
    border-bottom:1px solid var(--border); white-space:nowrap; text-transform:uppercase; letter-spacing:.3px;}
  td{padding:7px 9px; border-bottom:1px solid var(--border);}
  .tbl-wrap{overflow-x:auto;}
  .stat-card{background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px;}
  .stat-card .lbl{font-size:11px; color:var(--muted);}
  .stat-card .val{font-size:21px; font-weight:600; margin-top:3px;}
  .stat-card.warn{border-color:var(--danger);} .stat-card.warn .val{color:var(--danger);}
  .grid-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:10px;}
  .xdel{background:none; border:none; color:var(--danger); font-size:17px; line-height:1; padding:0 4px;}
  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; display:flex;
    align-items:center; justify-content:center; padding:14px;}
  .modal{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:20px;
    width:100%; max-width:720px; max-height:92vh; overflow-y:auto;}
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .modal-head h3{font-size:15px; font-weight:600;}
  .modal-head button{background:none; border:none; color:var(--muted); font-size:22px; line-height:1;}
  .consum-row{display:flex; justify-content:space-between; padding:6px 10px; border-radius:8px;
    background:var(--panel2); margin-bottom:4px; font-size:12.5px;}
  .consum-row.insuf{background:var(--danger-bg); color:var(--danger);}
  .total-bar{display:flex; justify-content:space-between; padding:9px 12px; background:var(--panel2);
    border-radius:8px; margin:10px 0; font-size:13px;}
  .muted{color:var(--muted); font-size:13px;}
  .empty{color:var(--muted); font-size:13px; padding:8px 0;}
  .status{position:fixed; bottom:0; left:0; right:0; padding:8px 14px; font-size:11.5px;
    background:var(--panel); border-top:1px solid var(--border); color:var(--muted); z-index:50;
    display:flex; justify-content:space-between;}
  .status .ok{color:var(--ok);} .status .err{color:var(--danger);}
  .add-line-btn{padding:8px 13px; border-radius:8px; border:none; background:var(--accent);
    color:#1a1408; font-size:17px; font-weight:700;}
  .warn-txt{color:var(--danger); font-size:12px; margin-top:6px;}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Chef <span>SOSIN</span></h1>
    <p>Aplicație Atelier · v2.0 · sincronizat în cloud</p>
    <div class="stats" id="stats"></div>
  </header>
  <div class="tabs" id="tabs"></div>
  <div id="content"><p class="empty">Se încarcă datele…</p></div>
</div>
<div id="modal-root"></div>
<div class="status"><span id="sync-status">Conectare la baza de date…</span><span>Chef SOSIN Atelier</span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB7EFgDv4_98KNb5sLsly-jQriDfixlll4",
  authDomain: "chef-sosin-livrari-4b835.firebaseapp.com",
  projectId: "chef-sosin-livrari-4b835",
  storageBucket: "chef-sosin-livrari-4b835.firebasestorage.app",
  messagingSenderId: "958105992536",
  appId: "1:958105992536:web:376e0d4d51970d5f19392d",
  measurementId: "G-VS76KRVKEK"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
/* Numele bazei de date Firestore. Dacă folosești aceeași bază ca la
   aplicația de livrări, las-o "adreseclienti"; pentru baza implicită
   a proiectului, schimb-o în "(default)". */
const FIRESTORE_DB_NAME = "adreseclienti";
/* ═══════════════════════════════════════════════════════════════ */

const app = initializeApp(firebaseConfig);
const db = FIRESTORE_DB_NAME === "(default)" ? getFirestore(app) : getFirestore(app, FIRESTORE_DB_NAME);

const COLS = ["furnizori","clienti","intrari_mp","intrari_ambalaje","retete","loturi","vanzari","facturi_intrare","facturi_iesire"];
const CP = "atelier_"; // prefix colecții
const D = {}; COLS.forEach(c => D[c] = []);

const TVA = [0,11,21];
const UM = ["g","kg","ml","L","buc","pungă","cutie"];
const DIM = ["156ml","200ml","300ml","1000ml","1700ml"];

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const azi = () => new Date().toISOString().split("T")[0];
const setStatus = (msg, cls="") => { $("sync-status").innerHTML = `<span class="${cls}">${msg}</span>`; };

async function loadCol(c){
  const snap = await getDocs(collection(db, CP + c));
  D[c] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function loadAll(){
  setStatus("Sincronizare…");
  try { await Promise.all(COLS.map(loadCol)); setStatus("✓ Sincronizat cu baza de date", "ok"); }
  catch(e){ setStatus("⚠ Eroare conexiune: " + e.message, "err"); }
}
async function dbAdd(c, data){ const r = await addDoc(collection(db, CP + c), data); D[c].push({ id: r.id, ...data }); }
async function dbDel(c, id){ await deleteDoc(doc(db, CP + c, id)); D[c] = D[c].filter(x => x.id !== id); }
async function dbUpd(c, id, data){ await updateDoc(doc(db, CP + c, id), data); const i = D[c].findIndex(x => x.id === id); if(i >= 0) D[c][i] = { ...D[c][i], ...data }; }

function stocMP(){ const s = {}; D.intrari_mp.forEach(r => s[r.ingredient] = (s[r.ingredient]||0) + r.cantitate); return s; }
function pretMediu(ig){
  const intr = D.intrari_mp.filter(r => r.ingredient === ig);
  if(!intr.length) return 0;
  const tc = intr.reduce((s,r)=>s+r.cantitate,0), tv = intr.reduce((s,r)=>s+r.cantitate*r.pret,0);
  return tc > 0 ? tv/tc : 0;
}
function stocAmbalaje(){
  const s = { borcane:{}, capace:{}, etichete:{} };
  D.intrari_ambalaje.forEach(r => { const k = r.tip === "etichete" ? r.produs : r.dim; s[r.tip][k] = (s[r.tip][k]||0) + r.numar; });
  D.loturi.forEach(l => {
    if(s.borcane[l.dim_borcan] !== undefined) s.borcane[l.dim_borcan] = Math.max(0, s.borcane[l.dim_borcan] - l.nr_borcane);
    if(s.capace[l.dim_borcan] !== undefined) s.capace[l.dim_borcan] = Math.max(0, s.capace[l.dim_borcan] - l.nr_borcane);
  });
  return s;
}
function stocProduse(){
  const s = {};
  D.loturi.forEach(l => { if(!s[l.produs]) s[l.produs] = { produs:0, vandut:0 }; s[l.produs].produs += l.nr_borcane; });
  D.vanzari.forEach(v => { if(!s[v.produs]) s[v.produs] = { produs:0, vandut:0 }; s[v.produs].vandut += v.numar; });
  return s;
}

// ── UI helpers ────────────────────────────────────────────────────
function optHtml(opts, sel=""){ return opts.map(o => { const v = o.value ?? o, l = o.label ?? o;
  return `<option value="${esc(v)}"${String(v)===String(sel)?" selected":""}>${esc(l)}</option>`; }).join(""); }
const furnOpts = sel => optHtml([{value:"",label:"— Furnizor —"}, ...D.furnizori.map(f=>({value:f.id,label:f.nume}))], sel);
const clientOpts = sel => optHtml([{value:"",label:"— Client —"}, ...D.clienti.map(f=>({value:f.id,label:f.nume}))], sel);
const tvaOpts = sel => optHtml(TVA.map(t=>({value:t,label:t+"%"})), sel);
const umOpts = sel => optHtml(UM, sel);
const dimOpts = sel => optHtml([{value:"",label:"— dim —"}, ...DIM], sel);
const fNume = id => D.furnizori.find(f => f.id === id)?.nume || "—";
const cNume = id => D.clienti.find(c => c.id === id)?.nume || "—";

function openModal(title, body){
  $("modal-root").innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal"><div class="modal-head"><h3>${esc(title)}</h3>
    <button onclick="closeModal()">×</button></div><div id="modal-body">${body}</div></div></div>`;
}
window.closeModal = () => { $("modal-root").innerHTML = ""; };

// ── TABS ──────────────────────────────────────────────────────────
const TABS = [
  ["parteneri","🏭 Parteneri"],["fact_in","📥 Facturi intrare"],["fact_out","📤 Facturi ieșire"],
  ["inventar","📦 Inventar"],["retete","📋 Rețete"],["productie","⚗️ Producție"],
  ["loturi","🏷️ Loturi"],["stoc","🛒 Stoc produse"],["preturi","💰 Prețuri"]
];
let activeTab = "parteneri";
const SUB = { parteneri:"furnizori", inventar:"mp", loturi:null };

window.setTab = t => { activeTab = t; render(); };
window.setSub = (grp, v) => { SUB[grp] = v; render(); };

function renderStats(){
  const pf = D.loturi.reduce((s,l)=>s+l.nr_borcane,0) - D.vanzari.reduce((s,v)=>s+v.numar,0);
  $("stats").innerHTML = [
    ["MP în stoc", Object.keys(stocMP()).length], ["Produse finite", pf], ["Loturi", D.loturi.length],
    ["Facturi IN", D.facturi_intrare.length], ["Facturi OUT", D.facturi_iesire.length]
  ].map(([l,v]) => `<div class="stat">${l}<b>${v}</b></div>`).join("");
}

function render(){
  renderStats();
  $("tabs").innerHTML = TABS.map(([id,l]) =>
    `<button class="tab${id===activeTab?" active":""}" onclick="setTab('${id}')">${l}</button>`).join("");
  const R = { parteneri:rParteneri, fact_in:rFactIn, fact_out:rFactOut, inventar:rInventar,
    retete:rRetete, productie:rProductie, loturi:rLoturi, stoc:rStoc, preturi:rPreturi };
  $("content").innerHTML = R[activeTab]();
}

// ── PARTENERI ─────────────────────────────────────────────────────
function rParteneri(){
  const tab = SUB.parteneri, lbl = tab === "furnizori" ? "furnizor" : "client";
  const list = D[tab];
  return `
  <div class="subtabs">
    <button class="subtab${tab==="furnizori"?" active":""}" onclick="setSub('parteneri','furnizori')">Furnizori</button>
    <button class="subtab${tab==="clienti"?" active":""}" onclick="setSub('parteneri','clienti')">Clienți</button>
  </div>
  <div class="card"><h3>Adaugă ${lbl}</h3>
    <div class="grid g4">
      <div><label class="fld">Denumire *</label><input id="p-nume"></div>
      <div><label class="fld">Contact</label><input id="p-contact"></div>
      <div><label class="fld">Telefon</label><input id="p-tel"></div>
      <div><label class="fld">CUI</label><input id="p-cui"></div>
    </div>
    <button class="btn btn-p" onclick="addPartener('${tab}')">+ Adaugă ${lbl}</button>
  </div>
  ${list.length === 0 ? `<p class="empty">Niciun ${lbl} înregistrat.</p>` : ""}
  ${list.map(p => `<div class="card"><div class="row-item">
    <div class="info"><p>${esc(p.nume)}${p.cui ? " · CUI: " + esc(p.cui) : ""}</p>
    ${p.contact || p.telefon ? `<p>${esc(p.contact||"")}${p.telefon ? " · " + esc(p.telefon) : ""}</p>` : ""}</div>
    <button class="btn btn-d btn-sm" onclick="delRec('${tab}','${p.id}')">Șterge</button>
  </div></div>`).join("")}`;
}
window.addPartener = async tab => {
  const nume = $("p-nume").value.trim();
  if(!nume) return;
  await dbAdd(tab, { nume, contact: $("p-contact").value.trim(), telefon: $("p-tel").value.trim(), cui: $("p-cui").value.trim() });
  render();
};
window.delRec = async (col, id) => {
  if(!confirm("Sigur ștergi această înregistrare?")) return;
  await dbDel(col, id); render();
};

// ── FACTURI INTRARE ───────────────────────────────────────────────
let fiLinii = [], fiTab = "mp";
function rFactIn(){
  return `
  <button class="btn btn-p" style="margin-bottom:14px" onclick="openFactIn()">+ Factură intrare nouă</button>
  ${D.facturi_intrare.length === 0 ? `<p class="empty">Nicio factură de intrare înregistrată.</p>` : ""}
  ${[...D.facturi_intrare].reverse().map(f => {
    const tf = (f.linii||[]).reduce((s,l)=>s+l.cantitate*l.pret_fara,0);
    const tc = (f.linii||[]).reduce((s,l)=>s+l.cantitate*l.pret_cu,0);
    return `<div class="card"><div class="row-item">
    <div class="info"><p>Factura ${esc(f.nr)} · ${esc(f.data)}</p>
    <p>${esc(f.furnizor_nume||"—")} · ${(f.linii||[]).length} linii</p>
    <p>${tf.toFixed(2)} lei fără TVA · ${tc.toFixed(2)} lei cu TVA</p>
    <div class="chips">${(f.linii||[]).map(l => `<span class="chip">${esc(l.descriere)} · ${l.cantitate} ${esc(l.um||"buc")}</span>`).join("")}</div></div>
    <button class="btn btn-d btn-sm" onclick="delRec('facturi_intrare','${f.id}')">Șterge</button>
  </div></div>`; }).join("")}`;
}
window.openFactIn = () => {
  fiLinii = []; fiTab = "mp";
  openModal("Factură intrare nouă", `
    <div class="grid g3">
      <div><label class="fld">Nr. factură *</label><input id="fi-nr" placeholder="FAC-2026-001"></div>
      <div><label class="fld">Data</label><input id="fi-data" type="date" value="${azi()}"></div>
      <div><label class="fld">Furnizor</label><select id="fi-furn">${furnOpts()}</select></div>
    </div>
    <div class="subtabs" style="margin-top:8px">
      <button class="subtab active" id="fi-tab-mp" onclick="setFiTab('mp')">Materie primă</button>
      <button class="subtab" id="fi-tab-amb" onclick="setFiTab('amb')">Ambalaje</button>
    </div>
    <div id="fi-line-form"></div>
    <div id="fi-lines"></div>
    <div id="fi-footer"></div>`);
  drawFiLineForm(); drawFiLines();
};
window.setFiTab = t => {
  fiTab = t;
  $("fi-tab-mp").className = "subtab" + (t==="mp" ? " active" : "");
  $("fi-tab-amb").className = "subtab" + (t==="amb" ? " active" : "");
  drawFiLineForm();
};
function drawFiLineForm(){
  $("fi-line-form").innerHTML = fiTab === "mp" ? `
    <div class="grid g5" style="align-items:end">
      <div style="grid-column:span 2"><label class="fld">Ingredient *</label><input id="fl-ing"></div>
      <div><label class="fld">UM</label><select id="fl-um">${umOpts("g")}</select></div>
      <div><label class="fld">Cantitate</label><input id="fl-cant" type="number" step="any"></div>
      <div style="display:flex;gap:6px;align-items:end">
        <div style="flex:1"><label class="fld">Preț fără TVA</label><input id="fl-pret" type="number" step="any"></div>
      </div>
    </div>
    <div class="grid g3" style="align-items:end">
      <div><label class="fld">TVA</label><select id="fl-tva">${tvaOpts(11)}</select></div>
      <div></div>
      <div><button class="add-line-btn" style="width:100%" onclick="addFiLinie()">+ Adaugă linia</button></div>
    </div>` : `
    <div class="grid g4" style="align-items:end">
      <div><label class="fld">Tip</label><select id="fl-tip">${optHtml(["borcane","capace","etichete"])}</select></div>
      <div><label class="fld">Dimensiune / Produs</label>
        <select id="fl-dim">${dimOpts()}</select>
        <input id="fl-prod" placeholder="Produs (etichete)" style="display:none;margin-top:4px">
      </div>
      <div><label class="fld">Nr. bucăți</label><input id="fl-cant" type="number"></div>
      <div><label class="fld">Preț/buc fără TVA</label><input id="fl-pret" type="number" step="any"></div>
    </div>
    <div class="grid g3" style="align-items:end">
      <div><label class="fld">TVA</label><select id="fl-tva">${tvaOpts(11)}</select></div>
      <div></div>
      <div><button class="add-line-btn" style="width:100%" onclick="addFiLinie()">+ Adaugă linia</button></div>
    </div>`;
  if(fiTab === "amb"){
    $("fl-tip").onchange = e => {
      const et = e.target.value === "etichete";
      $("fl-dim").style.display = et ? "none" : "";
      $("fl-prod").style.display = et ? "" : "none";
    };
  }
}
window.addFiLinie = () => {
  const c = parseFloat($("fl-cant").value), p = parseFloat($("fl-pret").value), tva = parseInt($("fl-tva").value);
  if(!c || !p) return;
  if(fiTab === "mp"){
    const ing = $("fl-ing").value.trim(); if(!ing) return;
    fiLinii.push({ cat:"mp", ingredient:ing, um:$("fl-um").value, cantitate:c, pret_fara:p, tva,
      pret_cu:+(p*(1+tva/100)).toFixed(4), descriere: ing });
    $("fl-ing").value = ""; 
  } else {
    const tip = $("fl-tip").value;
    const dim = $("fl-dim").value, prod = $("fl-prod").value.trim();
    if(tip !== "etichete" && !dim) return;
    fiLinii.push({ cat:"amb", tip, dim: tip!=="etichete"?dim:"", produs: tip==="etichete"?prod:"",

      <div><label class="fld">Rețetă</label><select id="pr-reteta" onchange="prPreview=null;drawPreview()">

window.calcConsum = () => {
  const rid = $("pr-reteta").value, mult = parseFloat($("pr-mult").value);
  const reteta = D.retete.find(r => r.id === rid);
  if(!reteta || !mult) return;
  const stoc = { ...stocMP() };
  if(prEditLot) (prEditLot.consum_mp||[]).forEach(c => stoc[c.ingredient] = (stoc[c.ingredient]||0) + c.cantitate);
  prPreview = { reteta, mult, consum: (reteta.ingrediente||[]).map(ig => {
    const necesar = ig.cantitate * mult, disp = stoc[ig.ingredient] || 0;
    return { ingredient:ig.ingredient, um:ig.um, necesar, disp, ok: disp >= necesar };
  })};
  drawPreview();
};
window.drawPreview = () => {
  if(!$("pr-preview")) return;
  if(!prPreview){ $("pr-preview").innerHTML = ""; $("pr-actions").innerHTML = ""; return; }
  $("pr-preview").innerHTML = prPreview.consum.map(c =>
    `<div class="consum-row${c.ok?"":" insuf"}"><span>${esc(c.ingredient)}</span>
    <span>${c.necesar.toFixed(1)} ${esc(c.um)}${c.ok ? "" : " ⚠ stoc: " + c.disp.toFixed(1)}</span></div>`).join("");
  const nrb = $("pr-nrb").value;
  $("pr-actions").innerHTML = (prPreview && nrb)
    ? `<button class="btn btn-p btn-full" style="margin-top:8px" onclick="execProductie()">${prEditLot ? "Salvează modificările →" : "Confirmă producția →"}</button>`
    : `<p class="warn-txt">Completează numărul de borcane umplute.</p>`;
};
window.execProductie = async () => {
  if(!prPreview) return;
  if(prPreview.consum.some(c => !c.ok)){ alert("Stoc insuficient pentru unele ingrediente!"); return; }
  const nrb = parseInt($("pr-nrb").value); if(!nrb) return;
  setStatus("Se salvează…");
  // restaurăm consumul lotului vechi (la editare)
  if(prEditLot){
    for(const c of (prEditLot.consum_mp||[])){
      const row = D.intrari_mp.find(x => x.ingredient === c.ingredient);
      if(row) await dbUpd("intrari_mp", row.id, { cantitate: row.cantitate + c.cantitate });
      else await dbAdd("intrari_mp", { ingredient:c.ingredient, um:c.um, cantitate:c.cantitate, pret:0, tva:11, furnizor:"", factura:"restaurare lot", data:azi() });
    }
  }
  // scădem consumul nou, secvențial pe rânduri
  for(const c of prPreview.consum){
    let ramas = c.necesar;
    for(const row of D.intrari_mp.filter(x => x.ingredient === c.ingredient)){
      if(ramas <= 0) break;
      const scad = Math.min(row.cantitate, ramas);
      if(scad > 0){ await dbUpd("intrari_mp", row.id, { cantitate: row.cantitate - scad }); ramas -= scad; }
    }
  }
  const lotData = { numar:$("pr-lot").value.trim(), produs:prPreview.reteta.produs, reteta_id:prPreview.reteta.id,
    multiplicator:prPreview.mult, dim_borcan:$("pr-dim").value, nr_borcane:nrb, data:$("pr-data").value,
    consum_mp: prPreview.consum.map(c => ({ ingredient:c.ingredient, cantitate:c.necesar, um:c.um })) };
  if(prEditLot) await dbUpd("loturi", prEditLot.id, lotData);
  else await dbAdd("loturi", lotData);
  setStatus("✓ Sincronizat cu baza de date","ok");
  prEditLot = null; prPreview = null;
  closeModal(); render();
};

// ── LOTURI ────────────────────────────────────────────────────────
function rLoturi(){
  const produse = [...new Set(D.loturi.map(l => l.produs))];
  if(produse.length === 0) return `<p class="empty">Niciun lot produs încă.</p>`;
  if(!SUB.loturi || !produse.includes(SUB.loturi)) SUB.loturi = produse[0];
  const cur = SUB.loturi;
  const loturiP = D.loturi.filter(l => l.produs === cur);
  const vandut = D.vanzari.filter(v => v.produs === cur).reduce((s,v)=>s+v.numar,0);
  const total = loturiP.reduce((s,l)=>s+l.nr_borcane,0);
  const dimC = {};
  loturiP.forEach(l => dimC[l.dim_borcan] = (dimC[l.dim_borcan]||0) + l.nr_borcane);
  return `
  <div class="subtabs">${produse.map(p =>
    `<button class="subtab${p===cur?" active":""}" onclick="setSub('loturi','${esc(p)}')">${esc(p)}</button>`).join("")}</div>
  <div class="grid g3" style="margin-bottom:14px">
    <div class="stat-card"><div class="lbl">Total produs</div><div class="val">${total}</div></div>
    <div class="stat-card"><div class="lbl">Vândut</div><div class="val">${vandut}</div></div>
    <div class="stat-card${total-vandut<5?" warn":""}"><div class="lbl">Stoc curent</div><div class="val">${total-vandut}</div></div>
  </div>
  <p style="font-size:12px;font-weight:600;margin-bottom:6px">Distribuție pe dimensiuni borcan</p>
  <div class="chips" style="margin-bottom:16px">${Object.entries(dimC).map(([d,n]) =>
    `<span class="chip"><b>${esc(d)}</b> · ${n} borcane</span>`).join("")}</div>
  <p style="font-size:12px;font-weight:600;margin-bottom:6px">Loturi (${loturiP.length})</p>
  ${loturiP.map(l => lotCardHtml(l)).join("")}`;
}

// ── STOC PRODUSE ──────────────────────────────────────────────────
function rStoc(){
  const s = stocProduse();
  if(Object.keys(s).length === 0) return `<p class="empty">Niciun produs finit în stoc.</p>`;
  return `<div class="grid-cards">${Object.entries(s).map(([p,x]) => {
    const sc = x.produs - x.vandut;
    return `<div class="stat-card${sc<5?" warn":""}"><div class="lbl">${esc(p)}</div>
    <div class="val">${sc}</div>
    <div class="lbl">produs: ${x.produs} · vândut: ${x.vandut}</div></div>`; }).join("")}</div>`;
}

// ── PREȚURI ───────────────────────────────────────────────────────
let cpSel = "", cpNr = "10", cpAmb = "1.5", cpMarja = "40";
function rPreturi(){
  const reteta = D.retete.find(r => r.id === cpSel);
  const costMPv = reteta ? (reteta.ingrediente||[]).reduce((s,ig) => s + pretMediu(ig.ingredient) * ig.cantitate, 0) : 0;
  const nrB = parseFloat(cpNr)||1, costAm = parseFloat(cpAmb)||0;
  const ct = costMPv/nrB + costAm, pv = ct / (1 - (parseFloat(cpMarja)||0)/100);
  return `
  <div class="card"><h3>Parametri calcul</h3>
    <div class="grid g4">
      <div><label class="fld">Rețetă</label><select onchange="cpSet('sel',this.value)">
        ${optHtml([{value:"",label:"— Rețetă —"}, ...D.retete.map(r=>({value:r.id,label:r.produs}))], cpSel)}</select></div>
      <div><label class="fld">Nr. borcane/lot</label><input type="number" value="${cpNr}" oninput="cpSet('nr',this.value)"></div>
      <div><label class="fld">Cost ambalaj/buc (lei)</label><input type="number" step="any" value="${cpAmb}" oninput="cpSet('amb',this.value)"></div>
      <div><label class="fld">Marjă profit (%)</label><input type="number" value="${cpMarja}" oninput="cpSet('marja',this.value)"></div>
    </div>
  </div>
  ${reteta ? `<div class="grid-cards">
    <div class="stat-card"><div class="lbl">Cost MP/borcan</div><div class="val">${(costMPv/nrB).toFixed(2)} lei</div></div>
    <div class="stat-card"><div class="lbl">Cost ambalaj</div><div class="val">${costAm.toFixed(2)} lei</div></div>
    <div class="stat-card"><div class="lbl">Cost total/borcan</div><div class="val">${ct.toFixed(2)} lei</div></div>
    <div class="stat-card"><div class="lbl">Preț vânzare (${cpMarja}%)</div><div class="val">${pv.toFixed(2)} lei</div></div>
  </div>` : `<p class="empty">Selectează o rețetă pentru calcul.</p>`}`;
}
window.cpSet = (k,v) => {
  if(k==="sel"){ cpSel = v; render(); return; }
  if(k==="nr") cpNr = v; if(k==="amb") cpAmb = v; if(k==="marja") cpMarja = v;
  // re-render doar cardurile de rezultat, fără a pierde focus:
  const reteta = D.retete.find(r => r.id === cpSel);
  if(!reteta) return;
  render(); // simplu și sigur
};

// ── START ─────────────────────────────────────────────────────────
loadAll().then(render);
</script>
