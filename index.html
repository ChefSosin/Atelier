<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chef SOSIN — Atelier</title>
<style>
  :root{
    --bg:#111213; --panel:#1b1c1e; --panel2:#232527; --border:#2f3134;
    --text:#ececec; --muted:#9a9a9a; --accent:#d4a24c; --accent2:#e8c37a;
    --danger:#e05252; --danger-bg:#3a2020; --ok:#4caf7d;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; padding-bottom:60px;}
  .container{max-width:1080px; margin:0 auto; padding:0 14px;}
  header{padding:18px 0 12px; border-bottom:1px solid var(--border); margin-bottom:14px;}
  header h1{font-size:19px; font-weight:600; letter-spacing:.3px;}
  header h1 span{color:var(--accent);}
  header p{font-size:11px; color:var(--muted); margin-top:2px;}
  .stats{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
  .stat{background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:6px 12px; font-size:12px; color:var(--muted);}
  .stat b{color:var(--text); margin-left:4px;}
  .tabs{display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:16px;
    -webkit-overflow-scrolling:touch;}
  .tab{padding:7px 13px; border-radius:8px; font-size:12.5px; cursor:pointer; white-space:nowrap;
    border:1px solid var(--border); background:var(--panel); color:var(--text); flex-shrink:0;}
  .tab.active{border-color:var(--accent); background:#2a2418; color:var(--accent2); font-weight:600;}
  .subtabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;}
  .subtab{padding:5px 12px; border-radius:8px; font-size:12px; cursor:pointer;
    border:1px solid var(--border); background:transparent; color:var(--text);}
  .subtab.active{border-color:var(--accent); background:#2a2418; color:var(--accent2); font-weight:600;}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:14px 16px; margin-bottom:10px;}
  .card h3{font-size:13px; font-weight:600; margin-bottom:10px;}
  .grid{display:grid; gap:8px; margin-bottom:8px;}
  .g2{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(3,1fr);}
  .g4{grid-template-columns:repeat(4,1fr);} .g5{grid-template-columns:repeat(5,1fr);}
  @media(max-width:640px){.g3,.g4,.g5{grid-template-columns:repeat(2,1fr);}}
  label.fld{display:block; font-size:10.5px; color:var(--muted); margin-bottom:3px; font-weight:600;
    text-transform:uppercase; letter-spacing:.4px;}
  input,select{width:100%; padding:8px 10px; font-size:13px; border-radius:8px;
    border:1px solid var(--border); background:var(--panel2); color:var(--text); outline:none;}
  input:focus,select:focus{border-color:var(--accent);}
  input[type=date]{color-scheme:dark;}
  button{cursor:pointer; font-family:inherit;}
  .btn{padding:8px 15px; font-size:13px; border-radius:8px; border:1px solid var(--border);
    background:var(--panel2); color:var(--text);}
  .btn-p{background:var(--accent); border-color:var(--accent); color:#1a1408; font-weight:600;}
  .btn-d{background:transparent; border-color:var(--danger); color:var(--danger);}
  .btn-sm{padding:4px 10px; font-size:11.5px;}
  .btn-full{width:100%; padding:10px;}
  .row-item{display:flex; justify-content:space-between; align-items:flex-start; gap:8px; flex-wrap:wrap;}
  .row-item .info p:first-child{font-weight:600; font-size:14px;}
  .row-item .info p{font-size:12px; color:var(--muted); margin-top:2px;}
  .row-item .info p:first-child{color:var(--text);}
  .chips{display:flex; flex-wrap:wrap; gap:4px; margin-top:6px;}
  .chip{font-size:11px; background:var(--panel2); padding:2px 8px; border-radius:6px;
    border:1px solid var(--border); color:var(--muted);}
  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  th{padding:7px 9px; text-align:left; font-weight:600; font-size:11px; color:var(--muted);
    border-bottom:1px solid var(--border); white-space:nowrap; text-transform:uppercase; letter-spacing:.3px;}
  td{padding:7px 9px; border-bottom:1px solid var(--border);}
  .tbl-wrap{overflow-x:auto;}
  .act{display:flex; gap:4px; align-items:center;}
  .stat-card{background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px;}
  .stat-card .lbl{font-size:11px; color:var(--muted);}
  .stat-card .val{font-size:21px; font-weight:600; margin-top:3px;}
  .stat-card.warn{border-color:var(--danger);} .stat-card.warn .val{color:var(--danger);}
  .grid-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:10px;}
  .xdel{background:none; border:none; color:var(--danger); font-size:17px; line-height:1; padding:0 4px;}
  .xedit{background:none; border:none; color:var(--accent); font-size:15px; line-height:1; padding:0 4px;}
  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:100; display:flex;
    align-items:center; justify-content:center; padding:14px;}
  .modal{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:20px;
    width:100%; max-width:720px; max-height:92vh; overflow-y:auto;}
  .modal-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .modal-head h3{font-size:15px; font-weight:600;}
  .modal-head button{background:none; border:none; color:var(--muted); font-size:22px; line-height:1;}
  .consum-row{display:flex; justify-content:space-between; padding:6px 10px; border-radius:8px;
    background:var(--panel2); margin-bottom:4px; font-size:12.5px;}
  .consum-row.insuf{background:var(--danger-bg); color:var(--danger);}
  .total-bar{display:flex; justify-content:space-between; padding:9px 12px; background:var(--panel2);
    border-radius:8px; margin:10px 0; font-size:13px;}
  .muted{color:var(--muted); font-size:13px;}
  .empty{color:var(--muted); font-size:13px; padding:8px 0;}
  .status{position:fixed; bottom:0; left:0; right:0; padding:8px 14px; font-size:11.5px;
    background:var(--panel); border-top:1px solid var(--border); color:var(--muted); z-index:50;
    display:flex; justify-content:space-between;}
  .status .ok{color:var(--ok);} .status .err{color:var(--danger);}
  .add-line-btn{padding:8px 13px; border-radius:8px; border:none; background:var(--accent);
    color:#1a1408; font-size:17px; font-weight:700;}
  .warn-txt{color:var(--danger); font-size:12px; margin-top:6px;}
</style>
</head>
<body>
<div id="login-ov" style="position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;text-align:center">
  <h2 style="font-size:20px">Chef <span style="color:var(--accent)">SOSIN</span> · Atelier</h2>
  <p class="muted" id="login-msg">Autentifică-te pentru a accesa aplicația.</p>
  <button class="btn btn-p" onclick="loginGoogle()">Conectare cu Google</button>
</div>
<div class="container">
  <header>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <div>
        <h1>Chef <span>SOSIN</span></h1>
        <p>Aplicație Atelier · v3.0 · sincronizat în cloud</p>
      </div>
      <button id="btn-logout" class="btn btn-sm" style="display:none" onclick="logoutUser()">Ieșire</button>
    </div>
    <div class="stats" id="stats"></div>
  </header>
  <div class="tabs" id="tabs"></div>
  <div id="content"><p class="empty">Se încarcă datele…</p></div>
</div>
<div id="modal-root"></div>
<div class="status"><span id="sync-status">Conectare la baza de date…</span><span>Chef SOSIN Atelier</span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, writeBatch }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, browserLocalPersistence, setPersistence, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB7EFgDv4_98KNb5sLsly-jQriDfixlll4",
  authDomain: "chef-sosin-livrari-4b835.firebaseapp.com",
  projectId: "chef-sosin-livrari-4b835",
  storageBucket: "chef-sosin-livrari-4b835.firebasestorage.app",
  messagingSenderId: "958105992536",
  appId: "1:958105992536:web:376e0d4d51970d5f19392d",
  measurementId: "G-VS76KRVKEK"
};
/* Numele bazei de date Firestore. Dacă folosești aceeași bază ca la
   aplicația de livrări, las-o "adreseclienti"; pentru baza implicită
   a proiectului, schimb-o în "(default)". */
const FIRESTORE_DB_NAME = "adreseclienti";
/* ═══════════════════════════════════════════════════════════════ */

const app = initializeApp(firebaseConfig);
const db = FIRESTORE_DB_NAME === "(default)" ? getFirestore(app) : getFirestore(app, FIRESTORE_DB_NAME);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
/* Adresele de e-mail care au acces la aplicație.
   Lista goală [] = orice cont Google autentificat are acces.
   Exemplu: const UTILIZATORI_PERMISI = ["adresa.ta@gmail.com"]; */
const UTILIZATORI_PERMISI = [];

const COLS = ["furnizori","clienti","intrari_mp","intrari_ambalaje","retete","loturi","vanzari","facturi_intrare","facturi_iesire"];
const CP = "atelier_"; // prefix colecții
const D = {}; COLS.forEach(c => D[c] = []);

const TVA = [0,11,21];
const UM = ["g","kg","ml","L","buc","pungă","cutie"];
const DIM = ["156ml","200ml","300ml","1000ml","1700ml"];
const CATEGORII = ["Legume","Fructe","Chili","Condimente & mirodenii","Cereale & leguminoase","Îndulcitori","Sare","Lichide & oțeturi","Culturi & enzime","Altele"];
const cmpRO = (a,b) => String(a??"").localeCompare(String(b??""), "ro");
const catOf = ing => { for(let i=D.intrari_mp.length-1;i>=0;i--){ const r=D.intrari_mp[i]; if(r.ingredient===ing && r.categorie) return r.categorie; } return "Altele"; };
const catOpts = sel => optHtml(CATEGORII, sel);

const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const azi = () => new Date().toISOString().split("T")[0];
const setStatus = (msg, cls="") => { $("sync-status").innerHTML = `<span class="${cls}">${msg}</span>`; };

async function loadCol(c){
  const snap = await getDocs(collection(db, CP + c));
  D[c] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function loadAll(){
  setStatus("Sincronizare…");
  try { await Promise.all(COLS.map(loadCol)); setStatus("✓ Sincronizat cu baza de date", "ok"); }
  catch(e){ setStatus("⚠ Eroare conexiune: " + e.message, "err"); }
}
async function dbAdd(c, data){ const r = await addDoc(collection(db, CP + c), data); D[c].push({ id: r.id, ...data }); }
async function dbDel(c, id){ await deleteDoc(doc(db, CP + c, id)); D[c] = D[c].filter(x => x.id !== id); }
async function dbUpd(c, id, data){ await updateDoc(doc(db, CP + c, id), data); const i = D[c].findIndex(x => x.id === id); if(i >= 0) D[c][i] = { ...D[c][i], ...data }; }

function stocMP(){ const s = {}; D.intrari_mp.forEach(r => s[r.ingredient] = (s[r.ingredient]||0) + r.cantitate); return s; }
function pretMediu(ig){
  const intr = D.intrari_mp.filter(r => r.ingredient === ig);
  if(!intr.length) return 0;
  const tc = intr.reduce((s,r)=>s+r.cantitate,0), tv = intr.reduce((s,r)=>s+r.cantitate*r.pret,0);
  return tc > 0 ? tv/tc : 0;
}
// Volumele unui lot: suportă noul format (borcane: [{dim,nr}]) și pe cel vechi (dim_borcan/nr_borcane)
function lotBorcane(l){
  if(Array.isArray(l.borcane) && l.borcane.length) return l.borcane;
  if(l.dim_borcan) return [{ dim:l.dim_borcan, nr:l.nr_borcane||0 }];
  return [];
}
function lotTotal(l){ return lotBorcane(l).reduce((s,b)=>s+(b.nr||0),0); }

function stocAmbalaje(){
  const s = { borcane:{}, capace:{}, etichete:{} };
  D.intrari_ambalaje.forEach(r => { const k = r.tip === "etichete" ? r.produs : r.dim; s[r.tip][k] = (s[r.tip][k]||0) + r.numar; });
  D.loturi.forEach(l => {
    lotBorcane(l).forEach(b => {
      if(s.borcane[b.dim] !== undefined) s.borcane[b.dim] = Math.max(0, s.borcane[b.dim] - b.nr);
      if(s.capace[b.dim] !== undefined) s.capace[b.dim] = Math.max(0, s.capace[b.dim] - b.nr);
    });
    if(l.nr_etichete && s.etichete[l.produs] !== undefined)
      s.etichete[l.produs] = Math.max(0, s.etichete[l.produs] - l.nr_etichete);
  });
  return s;
}
function stocProduse(){
  const s = {};
  D.loturi.forEach(l => { if(!s[l.produs]) s[l.produs] = { produs:0, vandut:0 }; s[l.produs].produs += lotTotal(l); });
  D.vanzari.forEach(v => { if(!s[v.produs]) s[v.produs] = { produs:0, vandut:0 }; s[v.produs].vandut += v.numar; });
  return s;
}

// ── UI helpers ────────────────────────────────────────────────────
function optHtml(opts, sel=""){ return opts.map(o => { const v = o.value ?? o, l = o.label ?? o;
  return `<option value="${esc(v)}"${String(v)===String(sel)?" selected":""}>${esc(l)}</option>`; }).join(""); }
const furnOpts = sel => optHtml([{value:"",label:"— Furnizor —"}, ...D.furnizori.map(f=>({value:f.id,label:f.nume}))], sel);
const clientOpts = sel => optHtml([{value:"",label:"— Client —"}, ...D.clienti.map(f=>({value:f.id,label:f.nume}))], sel);
const tvaOpts = sel => optHtml(TVA.map(t=>({value:t,label:t+"%"})), sel);
const umOpts = sel => optHtml(UM, sel);
const dimOpts = sel => optHtml([{value:"",label:"— dim —"}, ...DIM], sel);
const fNume = id => D.furnizori.find(f => f.id === id)?.nume || "—";
const cNume = id => D.clienti.find(c => c.id === id)?.nume || "—";

function openModal(title, body){
  $("modal-root").innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal"><div class="modal-head"><h3>${esc(title)}</h3>
    <button onclick="closeModal()">×</button></div><div id="modal-body">${body}</div></div></div>`;
}
window.closeModal = () => { $("modal-root").innerHTML = ""; };

// ── TABS ──────────────────────────────────────────────────────────
const TABS = [
  ["parteneri","🏭 Parteneri"],["fact_in","📥 Facturi intrare"],["fact_out","📤 Facturi ieșire"],
  ["inventar","📦 Inventar"],["retete","📋 Rețete"],["productie","⚗️ Producție"],
  ["loturi","🏷️ Loturi"],["stoc","🛒 Stoc produse"],["preturi","💰 Prețuri"]
];
let activeTab = "parteneri";
const SUB = { parteneri:"furnizori", inventar:"mp", loturi:null };

window.setTab = t => { activeTab = t; render(); };
window.setSub = (grp, v) => { SUB[grp] = v; render(); };

function renderStats(){
  const pf = D.loturi.reduce((s,l)=>s+lotTotal(l),0) - D.vanzari.reduce((s,v)=>s+v.numar,0);
  $("stats").innerHTML = [
    ["MP în stoc", Object.keys(stocMP()).length], ["Produse finite", pf], ["Loturi", D.loturi.length],
    ["Facturi IN", D.facturi_intrare.length], ["Facturi OUT", D.facturi_iesire.length]
  ].map(([l,v]) => `<div class="stat">${l}<b>${v}</b></div>`).join("");
}

function render(){
  renderStats();
  $("tabs").innerHTML = TABS.map(([id,l]) =>
    `<button class="tab${id===activeTab?" active":""}" onclick="setTab('${id}')">${l}</button>`).join("");
  const R = { parteneri:rParteneri, fact_in:rFactIn, fact_out:rFactOut, inventar:rInventar,
    retete:rRetete, productie:rProductie, loturi:rLoturi, stoc:rStoc, preturi:rPreturi };
  $("content").innerHTML = R[activeTab]();
}

// ── PARTENERI ─────────────────────────────────────────────────────
function rParteneri(){
  const tab = SUB.parteneri, lbl = tab === "furnizori" ? "furnizor" : "client";
  const list = D[tab];
  return `
  <div class="subtabs">
    <button class="subtab${tab==="furnizori"?" active":""}" onclick="setSub('parteneri','furnizori')">Furnizori</button>
    <button class="subtab${tab==="clienti"?" active":""}" onclick="setSub('parteneri','clienti')">Clienți</button>
  </div>
  <div class="card"><h3>Adaugă ${lbl}</h3>
    <div class="grid g4">
      <div><label class="fld">Denumire *</label><input id="p-nume"></div>
      <div><label class="fld">Contact</label><input id="p-contact"></div>
      <div><label class="fld">Telefon</label><input id="p-tel"></div>
      <div><label class="fld">CUI</label><input id="p-cui"></div>
    </div>
    <button class="btn btn-p" onclick="addPartener('${tab}')">+ Adaugă ${lbl}</button>
  </div>
  ${list.length === 0 ? `<p class="empty">Niciun ${lbl} înregistrat.</p>` : ""}
  ${list.map(p => `<div class="card"><div class="row-item">
    <div class="info"><p>${esc(p.nume)}${p.cui ? " · CUI: " + esc(p.cui) : ""}</p>
    ${p.contact || p.telefon ? `<p>${esc(p.contact||"")}${p.telefon ? " · " + esc(p.telefon) : ""}</p>` : ""}</div>
    <div class="act">
      <button class="btn btn-sm" onclick="editPartener('${tab}','${p.id}')">Editează</button>
      <button class="btn btn-d btn-sm" onclick="delRec('${tab}','${p.id}')">Șterge</button>
    </div>
  </div></div>`).join("")}`;
}
window.addPartener = async tab => {
  const nume = $("p-nume").value.trim();
  if(!nume) return;
  await dbAdd(tab, { nume, contact: $("p-contact").value.trim(), telefon: $("p-tel").value.trim(), cui: $("p-cui").value.trim() });
  render();
};
window.editPartener = (tab, id) => {
  const p = D[tab].find(x => x.id === id); if(!p) return;
  openModal("Editează " + (tab==="furnizori"?"furnizor":"client"), `
    <div class="grid g2">
      <div><label class="fld">Denumire *</label><input id="ep-nume" value="${esc(p.nume)}"></div>
      <div><label class="fld">Contact</label><input id="ep-contact" value="${esc(p.contact||"")}"></div>
      <div><label class="fld">Telefon</label><input id="ep-tel" value="${esc(p.telefon||"")}"></div>
      <div><label class="fld">CUI</label><input id="ep-cui" value="${esc(p.cui||"")}"></div>
    </div>
    <button class="btn btn-p btn-full" style="margin-top:10px" onclick="saveEditPartener('${tab}','${id}')">Salvează modificările</button>`);
};
window.saveEditPartener = async (tab, id) => {
  const nume = $("ep-nume").value.trim(); if(!nume) return;
  setStatus("Se salvează…");
  await dbUpd(tab, id, { nume, contact: $("ep-contact").value.trim(), telefon: $("ep-tel").value.trim(), cui: $("ep-cui").value.trim() });
  setStatus("✓ Sincronizat cu baza de date","ok");
  closeModal(); render();
};
window.delRec = async (col, id) => {
  if(!confirm("Sigur ștergi această înregistrare?")) return;
  await dbDel(col, id); render();
};

// ── FACTURI INTRARE ───────────────────────────────────────────────
let fiLinii = [], fiTab = "mp", fiEditId = null;
function rFactIn(){
  return `
  <button class="btn btn-p" style="margin-bottom:14px" onclick="openFactIn()">+ Factură intrare nouă</button>
  ${D.facturi_intrare.length === 0 ? `<p class="empty">Nicio factură de intrare înregistrată.</p>` : ""}
  ${[...D.facturi_intrare].reverse().map(f => {
    const tf = (f.linii||[]).reduce((s,l)=>s+l.cantitate*l.pret_fara,0);
    const tc = (f.linii||[]).reduce((s,l)=>s+l.cantitate*l.pret_cu,0);
    return `<div class="card"><div class="row-item">
    <div class="info"><p>Factura ${esc(f.nr)} · ${esc(f.data)}</p>
    <p>${esc(f.furnizor_nume||"—")} · ${(f.linii||[]).length} linii</p>
    <p>${tf.toFixed(2)} lei fără TVA · ${tc.toFixed(2)} lei cu TVA</p>
    <div class="chips">${(f.linii||[]).map(l => `<span class="chip">${esc(l.descriere)} · ${l.cantitate} ${esc(l.um||"buc")}</span>`).join("")}</div></div>
    <div class="act">
      <button class="btn btn-sm" onclick="openFactIn('${f.id}')">Editează</button>
      <button class="btn btn-d btn-sm" onclick="delRec('facturi_intrare','${f.id}')">Șterge</button>
    </div>
  </div></div>`; }).join("")}`;
}
window.openFactIn = (editId=null) => {
  fiEditId = editId; fiTab = "mp";
  const f = editId ? D.facturi_intrare.find(x => x.id === editId) : null;

      <div><label class="fld">TVA</label><select id="fl-tva">${tvaOpts(11)}</select></div>

      <div><button class="add-line-btn" style="width:100%" onclick="addFiLinie()">+ Adaugă linia</button></div>
    </div>`;

    $("fl-tip").onchange = e => {
      const et = e.target.value === "etichete";
      $("fl-dim").style.display = et ? "none" : "";
      $("fl-prod").style.display = et ? "" : "none";

  }
}
window.addFiLinie = () => {
  const c = parseFloat($("fl-cant").value), p = parseFloat($("fl-pret").value), tva = parseInt($("fl-tva").value);
  if(!c || !p) return;
  if(fiTab === "mp"){
    const ing = $("fl-ing").value.trim(); if(!ing) return;
    fiLinii.push({ cat:"mp", ingredient:ing, um:$("fl-um").value, cantitate:c, pret_fara:p, tva,
      pret_cu:+(p*(1+tva/100)).toFixed(4), descriere: ing });
    $("fl-ing").value = ""; 
  } else {
    const tip = $("fl-tip").value;
    const dim = $("fl-dim").value, prod = $("fl-prod").value.trim();
    if(tip !== "etichete" && !dim) return;

      um:"buc", cantitate:c, pret_fara:p, tva, pret_cu:+(p*(1+tva/100)).toFixed(4),
      descriere: tip + " " + (tip==="etichete" ? prod : dim) });
  }
  $("fl-cant").value = ""; $("fl-pret").value = "";
  drawFiLines();
};
window.delFiLinie = i => { fiLinii.splice(i,1); drawFiLines(); };
function drawFiLines(){
  if(!$("fi-lines")) return;
  if(fiLinii.length === 0){ $("fi-lines").innerHTML = ""; $("fi-footer").innerHTML = ""; return; }
  const tf = fiLinii.reduce((s,l)=>s+l.cantitate*l.pret_fara,0);
  const tc = fiLinii.reduce((s,l)=>s+l.cantitate*l.pret_cu,0);
  $("fi-lines").innerHTML = `<div class="tbl-wrap" style="margin-top:10px"><table>
    <tr><th>Descriere</th><th>Cant.</th><th>Fără TVA</th><th>TVA</th><th>Cu TVA</th><th>Total</th><th></th></tr>
    ${fiLinii.map((l,i) => `<tr><td><b>${esc(l.descriere)}</b> (${esc(l.um)})</td><td>${l.cantitate}</td>
      <td>${l.pret_fara.toFixed(2)}</td><td>${l.tva}%</td><td>${l.pret_cu.toFixed(2)}</td>
      <td>${(l.cantitate*l.pret_cu).toFixed(2)}</td>
      <td><button class="xdel" onclick="delFiLinie(${i})">×</button></td></tr>`).join("")}
  </table></div>`;
  $("fi-footer").innerHTML = `
    <div class="total-bar"><span>Total factură:</span>
      <span><b>${tf.toFixed(2)} lei</b> fără TVA · <b>${tc.toFixed(2)} lei</b> cu TVA</span></div>
    <button class="btn btn-p btn-full" onclick="saveFactIn()">✓ ${fiEditId ? "Salvează modificările" : "Salvează factura"} și actualizează stocurile</button>`;
}
window.saveFactIn = async () => {
  const nr = $("fi-nr").value.trim(); if(!nr || fiLinii.length === 0) return;
  const dt = $("fi-data").value, furn = $("fi-furn").value;
  setStatus("Se salvează…");
  try {
    const batch = writeBatch(db);
    // La editare: ștergem intrările vechi legate de această factură (după numărul facturii)
    if(fiEditId){
      const old = D.facturi_intrare.find(f => f.id === fiEditId);
      const oldNr = old?.nr;
      D.intrari_mp.filter(x => x.factura === oldNr).forEach(r => batch.delete(doc(db, CP+"intrari_mp", r.id)));
      D.intrari_ambalaje.filter(x => x.factura === oldNr).forEach(r => batch.delete(doc(db, CP+"intrari_ambalaje", r.id)));
    }
    // Recreăm intrările din liniile curente
    for(const l of fiLinii){
      if(l.cat === "mp") batch.set(doc(collection(db, CP+"intrari_mp")), { ingredient:l.ingredient, categorie:catOf(l.ingredient), um:l.um, cantitate:l.cantitate,
        pret:l.pret_fara, tva:l.tva, furnizor:furn, factura:nr, data:dt });
      else batch.set(doc(collection(db, CP+"intrari_ambalaje")), { tip:l.tip, dim:l.dim, produs:l.produs, numar:l.cantitate,
        pret:l.pret_fara, tva:l.tva, furnizor:furn, factura:nr, data:dt });
    }
    // Salvăm / actualizăm documentul de factură
    const fdata = { nr, data:dt, furnizor:furn, furnizor_nume:fNume(furn), linii:fiLinii };
    if(fiEditId) batch.update(doc(db, CP+"facturi_intrare", fiEditId), fdata);
    else batch.set(doc(collection(db, CP+"facturi_intrare")), fdata);
    await batch.commit();
    await Promise.all([loadCol("intrari_mp"), loadCol("intrari_ambalaje"), loadCol("facturi_intrare")]);
    setStatus("✓ Sincronizat cu baza de date","ok");
  } catch(e){ setStatus("⚠ Eroare la salvare: " + e.message, "err"); }
  fiEditId = null; closeModal(); render();
};

// ── FACTURI IEȘIRE ────────────────────────────────────────────────
let foLinii = [], foEditId = null;
function rFactOut(){
  return `
  <button class="btn btn-p" style="margin-bottom:14px" onclick="openFactOut()">+ Factură ieșire nouă</button>

    const tc = (f.linii||[]).reduce((s,l)=>s+l.cantitate*l.pret_cu,0);

    <div class="info"><p>Factura ${esc(f.nr)} · ${esc(f.data)}</p>

    <div class="chips">${(f.linii||[]).map(l => `<span class="chip">${esc(l.produs)} × ${l.cantitate} buc</span>`).join("")}</div>

    </div>
  </div></div>`; }).join("")}`;
}
window.openFactOut = (editId=null) => {
  foEditId = editId;
  const f = editId ? D.facturi_iesire.find(x => x.id === editId) : null;
  foLinii = f ? (f.linii||[]).map(l => ({...l})) : [];
  const produse = [...new Set(D.loturi.map(l => l.produs))];
  openModal(f ? `Editează factura ${esc(f.nr)}` : "Factură ieșire nouă", `
    <div class="grid g3">
      <div><label class="fld">Nr. factură *</label><input id="fo-nr" placeholder="FS-2026-001" value="${esc(f?.nr||"")}"></div>
      <div><label class="fld">Data</label><input id="fo-data" type="date" value="${f?.data||azi()}"></div>
      <div><label class="fld">Client</label><select id="fo-client">${clientOpts(f?.client||"")}</select></div>
    </div>
    <div class="grid g4" style="align-items:end;margin-top:8px">
      <div><label class="fld">Produs *</label>
        <select id="ol-prod">${optHtml([{value:"",label:"— Produs —"}, ...produse])}</select></div>
      <div><label class="fld">Nr. borcane</label><input id="ol-cant" type="number"></div>
      <div><label class="fld">Preț/buc fără TVA</label><input id="ol-pret" type="number" step="any"></div>
      <div><label class="fld">TVA</label><select id="ol-tva">${tvaOpts(11)}</select></div>
    </div>
    <button class="add-line-btn" style="width:100%;margin-top:6px" onclick="addFoLinie()">+ Adaugă produsul</button>
    <div id="fo-lines"></div><div id="fo-footer"></div>`);
  drawFoLines();
};
window.addFoLinie = () => {
  const prod = $("ol-prod").value, c = parseInt($("ol-cant").value), p = parseFloat($("ol-pret").value), tva = parseInt($("ol-tva").value);
  if(!prod || !c || !p) return;
  const sp = stocProduse();
  const disp = sp[prod] ? sp[prod].produs - sp[prod].vandut - foLinii.filter(l=>l.produs===prod).reduce((s,l)=>s+l.cantitate,0) : 0;
  if(c > disp && !confirm(`Atenție: stoc disponibil ${disp} buc pentru ${prod}. Continui?`)) return;
  foLinii.push({ produs:prod, cantitate:c, pret_fara:p, tva, pret_cu:+(p*(1+tva/100)).toFixed(4) });
  $("ol-cant").value = ""; $("ol-pret").value = "";
  drawFoLines();
};
window.delFoLinie = i => { foLinii.splice(i,1); drawFoLines(); };
function drawFoLines(){
  if(!$("fo-lines")) return;
  if(foLinii.length === 0){ $("fo-lines").innerHTML = ""; $("fo-footer").innerHTML = ""; return; }
  const tf = foLinii.reduce((s,l)=>s+l.cantitate*l.pret_fara,0);
  const tc = foLinii.reduce((s,l)=>s+l.cantitate*l.pret_cu,0);
  $("fo-lines").innerHTML = `<div class="tbl-wrap" style="margin-top:10px"><table>
    <tr><th>Produs</th><th>Cant.</th><th>Fără TVA</th><th>TVA</th><th>Cu TVA</th><th>Total</th><th></th></tr>
    ${foLinii.map((l,i) => `<tr><td><b>${esc(l.produs)}</b></td><td>${l.cantitate} buc</td>
      <td>${l.pret_fara.toFixed(2)}</td><td>${l.tva}%</td><td>${l.pret_cu.toFixed(2)}</td>
      <td>${(l.cantitate*l.pret_cu).toFixed(2)}</td>
      <td><button class="xdel" onclick="delFoLinie(${i})">×</button></td></tr>`).join("")}
  </table></div>`;
  $("fo-footer").innerHTML = `
    <div class="total-bar"><span>Total factură:</span>
      <span><b>${tf.toFixed(2)} lei</b> fără TVA · <b>${tc.toFixed(2)} lei</b> cu TVA</span></div>
    <button class="btn btn-p btn-full" onclick="saveFactOut()">✓ ${foEditId ? "Salvează modificările" : "Salvează factura"} și scade din stoc</button>`;
}
window.saveFactOut = async () => {
  const nr = $("fo-nr").value.trim(); if(!nr || foLinii.length === 0) return;
  const dt = $("fo-data").value, cl = $("fo-client").value;
  setStatus("Se salvează…");
  try {
    const batch = writeBatch(db);
    // La editare: ștergem vânzările vechi ale acestei facturi (stocul se reface)
    if(foEditId){
      const old = D.facturi_iesire.find(f => f.id === foEditId);
      const oldNr = old?.nr;
      D.vanzari.filter(v => v.factura === oldNr).forEach(v => batch.delete(doc(db, CP+"vanzari", v.id)));
    }
    for(const l of foLinii)
      batch.set(doc(collection(db, CP+"vanzari")), { produs:l.produs, numar:l.cantitate, pret:l.pret_fara, tva:l.tva, factura:nr, data:dt, client:cl });
    const fdata = { nr, data:dt, client:cl, client_nume:cNume(cl), linii:foLinii };
    if(foEditId) batch.update(doc(db, CP+"facturi_iesire", foEditId), fdata);
    else batch.set(doc(collection(db, CP+"facturi_iesire")), fdata);
    await batch.commit();
    await Promise.all([loadCol("vanzari"), loadCol("facturi_iesire")]);
    setStatus("✓ Sincronizat cu baza de date","ok");
  } catch(e){ setStatus("⚠ Eroare la salvare: " + e.message, "err"); }
  foEditId = null; closeModal(); render();
};
window.delFactOut = async id => {
  if(!confirm("Ștergi factura? Vânzările aferente vor fi și ele șterse, iar stocul se va reface.")) return;
  const f = D.facturi_iesire.find(x => x.id === id); if(!f) return;
  setStatus("Se salvează…");
  try {
    const batch = writeBatch(db);
    D.vanzari.filter(v => v.factura === f.nr).forEach(v => batch.delete(doc(db, CP+"vanzari", v.id)));
    batch.delete(doc(db, CP+"facturi_iesire", id));
    await batch.commit();
    await Promise.all([loadCol("vanzari"), loadCol("facturi_iesire")]);
    setStatus("✓ Sincronizat cu baza de date","ok");
  } catch(e){ setStatus("⚠ Eroare la ștergere: " + e.message, "err"); }
  render();
};

let prEditLot = null, prPreview = null, prBorcane = [];

    <p>${esc(l.numar)} · ${lotBorcane(l).map(b=>`${b.nr}×${esc(b.dim)}`).join(", ")}${l.nr_etichete != null ? ` · ${l.nr_etichete} etichete` : ""} · mult. ${l.multiplicator}× · ${esc(l.data)}</p>

window.openProductie = (lotId=null) => {
  prEditLot = lotId ? D.loturi.find(l => l.id === lotId) : null;

  openModal(l ? `Modifică lot: ${l.numar}` : "Producție nouă", `
    <div class="grid g2">

      <div><label class="fld">Multiplicator</label><input id="pr-mult" type="number" step="any" value="${l?.multiplicator||1}" oninput="prPreview=null;drawPreview()"></div>
    </div>
    <label class="fld" style="margin-bottom:4px">Volume de borcane produse *</label>
    <div class="grid g3" style="align-items:end">
      <div><label class="fld">Dimensiune</label><select id="pr-dim">${optHtml(DIM, "156ml")}</select></div>
      <div><label class="fld">Nr. borcane</label><input id="pr-nrb" type="number"></div>
      <div><button class="add-line-btn" style="width:100%" onclick="addPrBorcane()">+ Adaugă volum</button></div>
    </div>
    <div id="pr-borcane-list"></div>
    <div class="grid g3" style="margin-top:8px">
      <div><label class="fld">Nr. lot</label><input id="pr-lot" value="${esc(l?.numar || "LOT-"+Date.now().toString().slice(-6))}"></div>
      <div><label class="fld">Data producției</label><input id="pr-data" type="date" value="${l?.data||azi()}"></div>
      <div><label class="fld">Etichete consumate</label><input id="pr-etichete" type="number" placeholder="= total borcane" value="${l?.nr_etichete ?? ""}"></div>
    </div>
    <button class="btn" style="margin:10px 0" onclick="calcConsum()">Calculează consum MP</button>
    <div id="pr-preview"></div>
    <div id="pr-actions"></div>`);
  drawPrBorcane();
};
window.addPrBorcane = () => {
  const dim = $("pr-dim").value, nr = parseInt($("pr-nrb").value);
  if(!dim || !nr) return;
  const ex = prBorcane.find(b => b.dim === dim);
  if(ex) ex.nr += nr; else prBorcane.push({ dim, nr });
  $("pr-nrb").value = "";
  drawPrBorcane(); drawPreview();
};
window.delPrBorcane = i => { prBorcane.splice(i,1); drawPrBorcane(); drawPreview(); };
function drawPrBorcane(){
  if(!$("pr-borcane-list")) return;
  $("pr-borcane-list").innerHTML = prBorcane.length === 0
    ? `<p class="muted" style="margin:6px 0">Niciun volum adăugat încă.</p>`
    : prBorcane.map((b,i) => `<div class="consum-row"><span><b>${b.nr}</b> borcane × ${esc(b.dim)}</span>
      <button class="xdel" onclick="delPrBorcane(${i})">×</button></div>`).join("");
}
window.calcConsum = () => {
  const rid = $("pr-reteta").value, mult = parseFloat($("pr-mult").value);
  const reteta = D.retete.find(r => r.id === rid);
  if(!reteta || !mult) return;
  const stoc = { ...stocMP() };
  if(prEditLot) (prEditLot.consum_mp||[]).forEach(c => stoc[c.ingredient] = (stoc[c.ingredient]||0) + c.cantitate);
  prPreview = { reteta, mult, consum: (reteta.ingrediente||[]).map(ig => {
    const necesar = ig.cantitate * mult, disp = stoc[ig.ingredient] || 0;
    return { ingredient:ig.ingredient, um:ig.um, necesar, disp, ok: disp >= necesar };
  })};
  drawPreview();
};
window.drawPreview = () => {
  if(!$("pr-preview")) return;
  if(!prPreview){ $("pr-preview").innerHTML = ""; $("pr-actions").innerHTML = ""; return; }
  $("pr-preview").innerHTML = prPreview.consum.map(c =>
    `<div class="consum-row${c.ok?"":" insuf"}"><span>${esc(c.ingredient)}</span>
    <span>${c.necesar.toFixed(1)} ${esc(c.um)}${c.ok ? "" : " ⚠ stoc: " + c.disp.toFixed(1)}</span></div>`).join("");
  $("pr-actions").innerHTML = (prPreview && prBorcane.length)
    ? `<button class="btn btn-p btn-full" style="margin-top:8px" onclick="execProductie()">${prEditLot ? "Salvează modificările →" : "Confirmă producția →"}</button>`
    : `<p class="warn-txt">Adaugă cel puțin un volum de borcane.</p>`;
};
window.execProductie = async () => {
  if(!prPreview) return;
  if(prPreview.consum.some(c => !c.ok)){ alert("Stoc insuficient pentru unele ingrediente!"); return; }
  if(prBorcane.length === 0){ alert("Adaugă cel puțin un volum de borcane."); return; }
  setStatus("Se salvează…");
  try {
    // simulăm modificările local, apoi le scriem atomic într-un singur batch
    const local = D.intrari_mp.map(r => ({ ...r }));
    const noi = [];
    // restaurăm consumul lotului vechi (la editare)
    if(prEditLot){
      for(const c of (prEditLot.consum_mp||[])){
        const row = local.find(x => x.ingredient === c.ingredient);
        if(row) row.cantitate += c.cantitate;
        else noi.push({ ingredient:c.ingredient, categorie:catOf(c.ingredient), um:c.um, cantitate:c.cantitate, pret:0, tva:11, furnizor:"", factura:"restaurare lot", data:azi() });
      }
    }
    // scădem consumul nou, secvențial pe rânduri
    for(const c of prPreview.consum){
      let ramas = c.necesar;
      for(const row of local.filter(x => x.ingredient === c.ingredient)){
        if(ramas <= 0) break;
        const scad = Math.min(row.cantitate, ramas);
        if(scad > 0){ row.cantitate -= scad; ramas -= scad; }
      }
      for(const row of noi.filter(x => x.ingredient === c.ingredient)){
        if(ramas <= 0) break;
        const scad = Math.min(row.cantitate, ramas);
        if(scad > 0){ row.cantitate -= scad; ramas -= scad; }
      }
    }
    const batch = writeBatch(db);
    local.forEach((r,i) => { if(r.cantitate !== D.intrari_mp[i].cantitate) batch.update(doc(db, CP+"intrari_mp", r.id), { cantitate: r.cantitate }); });
    noi.forEach(n => batch.set(doc(collection(db, CP+"intrari_mp")), n));
    const nrEt = parseInt($("pr-etichete").value);
    const totalB = prBorcane.reduce((s,b)=>s+b.nr,0);
    const lotData = { numar:$("pr-lot").value.trim(), produs:prPreview.reteta.produs, reteta_id:prPreview.reteta.id,
      multiplicator:prPreview.mult, borcane: prBorcane.map(b => ({ dim:b.dim, nr:b.nr })),
      nr_etichete: isNaN(nrEt) ? totalB : nrEt, data:$("pr-data").value,
      consum_mp: prPreview.consum.map(c => ({ ingredient:c.ingredient, cantitate:c.necesar, um:c.um })) };
    if(prEditLot) batch.update(doc(db, CP+"loturi", prEditLot.id), lotData);
    else batch.set(doc(collection(db, CP+"loturi")), lotData);
    await batch.commit();
    await Promise.all([loadCol("intrari_mp"), loadCol("loturi")]);
    setStatus("✓ Sincronizat cu baza de date","ok");
  } catch(e){ setStatus("⚠ Eroare la salvare: " + e.message, "err"); }
  prEditLot = null; prPreview = null; prBorcane = [];
  closeModal(); render();
};

// ── LOTURI ────────────────────────────────────────────────────────
function rLoturi(){

  const cur = SUB.loturi;
  const loturiP = D.loturi.filter(l => l.produs === cur);
  const vandut = D.vanzari.filter(v => v.produs === cur).reduce((s,v)=>s+v.numar,0);
  const total = loturiP.reduce((s,l)=>s+lotTotal(l),0);
  const dimC = {};
  loturiP.forEach(l => lotBorcane(l).forEach(b => dimC[b.dim] = (dimC[b.dim]||0) + b.nr));
  return `
  <div class="subtabs">${produse.map(p =>
    `<button class="subtab${p===cur?" active":""}" onclick="setSub('loturi','${esc(p)}')">${esc(p)}</button>`).join("")}</div>
  <div class="grid g3" style="margin-bottom:14px">
    <div class="stat-card"><div class="lbl">Total produs</div><div class="val">${total}</div></div>
    <div class="stat-card"><div class="lbl">Vândut</div><div class="val">${vandut}</div></div>
    <div class="stat-card${total-vandut<5?" warn":""}"><div class="lbl">Stoc curent</div><div class="val">${total-vandut}</div></div>
  </div>
  <p style="font-size:12px;font-weight:600;margin-bottom:6px">Distribuție pe dimensiuni borcan</p>
  <div class="chips" style="margin-bottom:16px">${Object.entries(dimC).map(([d,n]) =>
    `<span class="chip"><b>${esc(d)}</b> · ${n} borcane</span>`).join("")}</div>
  <p style="font-size:12px;font-weight:600;margin-bottom:6px">Loturi (${loturiP.length})</p>
  ${loturiP.map(l => lotCardHtml(l)).join("")}`;

// ── STOC PRODUSE ──────────────────────────────────────────────────
function rStoc(){
  const s = stocProduse();
  if(Object.keys(s).length === 0) return `<p class="empty">Niciun produs finit în stoc.</p>`;
  return `<div class="grid-cards">${Object.entries(s).map(([p,x]) => {
    const sc = x.produs - x.vandut;
    return `<div class="stat-card${sc<5?" warn":""}"><div class="lbl">${esc(p)}</div>
    <div class="val">${sc}</div>
    <div class="lbl">produs: ${x.produs} · vândut: ${x.vandut}</div></div>`; }).join("")}</div>`;
}

// ── PREȚURI ───────────────────────────────────────────────────────
let cpSel = "", cpNr = "10", cpAmb = "1.5", cpMarja = "40";
function rPreturi(){
  const reteta = D.retete.find(r => r.id === cpSel);
  const costMPv = reteta ? (reteta.ingrediente||[]).reduce((s,ig) => s + pretMediu(ig.ingredient) * ig.cantitate, 0) : 0;
  const nrB = parseFloat(cpNr)||1, costAm = parseFloat(cpAmb)||0;
  const ct = costMPv/nrB + costAm, pv = ct / (1 - (parseFloat(cpMarja)||0)/100);
  return `
  <div class="card"><h3>Parametri calcul</h3>
    <div class="grid g4">
      <div><label class="fld">Rețetă</label><select onchange="cpSet('sel',this.value)">
        ${optHtml([{value:"",label:"— Rețetă —"}, ...D.retete.map(r=>({value:r.id,label:r.produs}))], cpSel)}</select></div>
      <div><label class="fld">Nr. borcane/lot</label><input type="number" value="${cpNr}" oninput="cpSet('nr',this.value)"></div>
      <div><label class="fld">Cost ambalaj/buc (lei)</label><input type="number" step="any" value="${cpAmb}" oninput="cpSet('amb',this.value)"></div>
      <div><label class="fld">Marjă profit (%)</label><input type="number" value="${cpMarja}" oninput="cpSet('marja',this.value)"></div>
    </div>
  </div>
  ${reteta ? `<div class="grid-cards">
    <div class="stat-card"><div class="lbl">Cost MP/borcan</div><div class="val">${(costMPv/nrB).toFixed(2)} lei</div></div>
    <div class="stat-card"><div class="lbl">Cost ambalaj</div><div class="val">${costAm.toFixed(2)} lei</div></div>
    <div class="stat-card"><div class="lbl">Cost total/borcan</div><div class="val">${ct.toFixed(2)} lei</div></div>
    <div class="stat-card"><div class="lbl">Preț vânzare (${cpMarja}%)</div><div class="val">${pv.toFixed(2)} lei</div></div>
  </div>` : `<p class="empty">Selectează o rețetă pentru calcul.</p>`}`;
}
window.cpSet = (k,v) => {
  if(k==="sel"){ cpSel = v; render(); return; }
  if(k==="nr") cpNr = v; if(k==="amb") cpAmb = v; if(k==="marja") cpMarja = v;
  // re-render doar cardurile de rezultat, fără a pierde focus:
  const reteta = D.retete.find(r => r.id === cpSel);
  if(!reteta) return;
  render(); // simplu și sigur
};

// ── START ─────────────────────────────────────────────────────────
// ── START (cu autentificare) ──────────────────────────────────────
window.loginGoogle = async () => {
  $("login-msg").textContent = "Se conectează…";
  try {
    await setPersistence(auth, browserLocalPersistence);
    await signInWithPopup(auth, provider);
  } catch(e){
    $("login-msg").textContent = "Popup indisponibil (" + e.code + "). Se încearcă redirecționarea…";
    try { await signInWithRedirect(auth, provider); }
    catch(e2){ $("login-msg").textContent = "Eroare autentificare: " + e2.code + " — " + e2.message; }
  }
};
window.logoutUser = () => signOut(auth);
getRedirectResult(auth).catch(e => { $("login-msg").textContent = "Eroare la revenire: " + e.code; });
onAuthStateChanged(auth, u => {
  if(u && (UTILIZATORI_PERMISI.length === 0 || UTILIZATORI_PERMISI.includes(u.email))){
    $("login-ov").style.display = "none";
    $("btn-logout").style.display = "";
    loadAll().then(render);
  } else if(u){
    $("login-msg").textContent = "Contul " + u.email + " nu are acces la această aplicație.";
    signOut(auth);
  } else {
    $("login-ov").style.display = "flex";
    $("btn-logout").style.display = "none";
  }
});
</script>
